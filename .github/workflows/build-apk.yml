name: Build Debug APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # This adds a manual "Run workflow" button in your GitHub Actions dashboard
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      # This compiles the code safely without needing specialized production Keystores
      run: ./gradlew assembleDebug 

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mr-BAIG-Debug-APK
        # FIX IMPLEMENTED: The ** search pattern forces GitHub to look inside all 
        # flavor and nested subdirectories so it will never give a "No files found" error.
        path: app/build/outputs/apk/**/*.apk 
        if-no-files-found: error
        retention-days: 7
